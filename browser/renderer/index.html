<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src http://localhost:3001;" />
  <title>Aegis Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Global Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #0d0d0f;
      --bg-secondary:  #13131a;
      --bg-elevated:   #1a1a24;
      --bg-hover:      #1f1f2e;
      --accent:        #6c63ff;
      --accent-glow:   rgba(108, 99, 255, 0.3);
      --accent-dim:    rgba(108, 99, 255, 0.15);
      --success:       #22c55e;
      --warning:       #f59e0b;
      --danger:        #ef4444;
      --text-primary:  #e2e2f0;
      --text-secondary:#8888aa;
      --text-muted:    #55556a;
      --border:        rgba(255,255,255,0.06);
      --border-accent: rgba(108,99,255,0.3);
      --radius-sm:     6px;
      --radius-md:     10px;
      --radius-lg:     16px;
      --font-ui:       'Inter', system-ui, sans-serif;
      --font-mono:     'JetBrains Mono', 'Courier New', monospace;
      --tab-height:    42px;
      --dash-width:    320px;
    }

    html, body, #root {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
  </style>
</head>
<body>
  <div id="root"></div>
  <!--
    NOTE: In a real Electron + React build pipeline, this script tag
    would point to the Webpack/Vite bundled output. For Phase 1 prototype,
    we use a simple inline-script approach via CDN React (dev only).
    In production, run: npm run build → points to renderer/dist/bundle.js
  -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="./App.jsx" data-type="module"></script>
</body>
</html>
